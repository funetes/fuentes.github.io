---
layout: default
---

<style>
  /* PC 화면 기준 레이아웃 */
  @media (min-width: 1024px) {
    .post-container {
      display: flex;
      flex-direction: row-reverse; /* TOC를 오른쪽에 두기 위함 */
      align-items: flex-start;
      gap: 30px;
    }

    .post-toc {
      position: sticky;
      top: 20px;
      width: 250px;
      min-width: 250px;
      padding: 15px;
      background: #f9f9f9;
      border-left: 3px solid #159957; /* Cayman 테마 메인 색상 */
      font-size: 0.9rem;
    }

    .post-content {
      flex: 1;
      max-width: calc(100% - 280px);
    }
  }

  /* 목차 리스트 스타일 제거 */
  .post-toc ul {
    list-style: none;
    padding-left: 15px;
    margin: 0;
  }
</style>

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.27.0/tocbot.css"
/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.27.0/tocbot.min.js"></script>

<small>{{ page.date | date: "%Y-%m-%d" }}</small>

<div class="wrapper">
  <aside class="js-toc toc-sticky"></aside>

  <article class="js-toc-content">{{ content }}</article>
</div>

<a href="{{ site.baseurl }}/">← 메인으로</a>

<script>
  tocbot.init({
    tocSelector: ".js-toc", // TOC를 넣을 선택자
    contentSelector: ".js-toc-content", // 본문 내용 선택자
    headingSelector: "h1, h2, h3", // 목차로 만들 헤더 수준
  });
</script>
